name: Build Debug APK

on:
  push:
    branches: [main, claude/app-ui-issues-t4ajad]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      # اسم ملف يحمل رقم البناء ومعرّف الكومِت — يمنع الكاش ويوضّح النسخة
      - name: Rename APK
        run: |
          mkdir -p out
          cp androidApp/build/outputs/apk/debug/*.apk \
             "out/rafiq-aldhikr-${GITHUB_RUN_NUMBER}-${GITHUB_SHA:0:7}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafiq-aldhikr-debug
          path: out/*.apk

      # نسخة قابلة للتنزيل المباشر من صفحة Releases (أسهل على الموبايل)
      - name: Publish to debug-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "نسخة تجريبية — آخر بناء"
          prerelease: true
          body: |
            نسخة Debug تلقائية من آخر تعديلات الفرع.

            • رقم البناء: ${{ github.run_number }}
            • الكومِت: ${{ github.sha }}

            نزّل ملف الـ APK أدناه (اسمه يحمل رقم البناء) وثبّته.
            إذا لم يتحدّث التطبيق: احذف القديم أولاً ثم ثبّت الجديد.
            للتأكد من النسخة: افتح التطبيق → الإعدادات → حول التطبيق (سيظهر رقم البناء).
          files: out/*.apk

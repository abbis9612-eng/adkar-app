name: Build Debug APK

on:
  push:
    branches: [main, claude/app-ui-issues-t4ajad]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rafiq-aldhikr-debug
          path: androidApp/build/outputs/apk/debug/*.apk

      # نسخة قابلة للتنزيل المباشر من صفحة Releases (أسهل على الموبايل)
      - name: Publish to debug-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: debug-latest
          name: "نسخة تجريبية — آخر بناء"
          prerelease: true
          body: |
            نسخة Debug تلقائية من آخر تعديلات الفرع.
            نزّل ملف الـ APK أدناه وثبّته على جهازك (فعّل "التثبيت من مصادر غير معروفة").
          files: androidApp/build/outputs/apk/debug/*.apk

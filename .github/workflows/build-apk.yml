name: Build Adhkar APK (uiux-improvement-plan)

# Builds a debug APK from the uiux-improvement-plan branch so the new UI/UX
# redesign can be installed and tested on a phone, then publishes it as a
# GitHub Release with a direct download link.

on:
  workflow_dispatch:
  push:
    branches:
      - claude/nice-ramanujan-bgewi4

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout uiux-improvement-plan (the new UI code)
        uses: actions/checkout@v4
        with:
          ref: uiux-improvement-plan

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

      - name: Build debug APK
        run: ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Locate built APK
        id: apk
        run: |
          APK=$(find androidApp/build/outputs/apk/debug -name "*.apk" | head -n1)
          echo "Found APK: $APK"
          cp "$APK" RafiqAlDhikr-uiux-debug.apk
          echo "path=RafiqAlDhikr-uiux-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: RafiqAlDhikr-uiux-debug-apk
          path: ${{ steps.apk.outputs.path }}

      - name: Publish APK to a Release (direct download link)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="uiux-apk"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${{ steps.apk.outputs.path }}" --clobber
          else
            gh release create "$TAG" "${{ steps.apk.outputs.path }}" \
              --title "رفيق الذكر — نسخة الواجهة الجديدة (uiux)" \
              --notes "APK تجريبي (debug) مبني من فرع uiux-improvement-plan لتجربة التصميم الجديد على الهاتف." \
              --target uiux-improvement-plan
          fi
